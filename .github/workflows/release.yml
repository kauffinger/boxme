name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Created if it doesn't exist."
        required: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      # microsandbox pulls native build deps: aws-lc-sys (cmake + C compiler),
      # libdbus-sys (libdbus-1-dev + pkg-config), and vendored C libs
      # (sqlite/zstd/bzip2, served by the preinstalled gcc). msb_krun itself is
      # pure Rust, so there is no libkrun system package to install.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config libdbus-1-dev

      - name: Verify cmake (macOS)
        if: runner.os == 'macOS'
        run: cmake --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tarball="boxme-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          tar -czf "dist/$tarball" -C "target/${{ matrix.target }}/release" boxme
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "$tarball" > "$tarball.sha256")
          else
            (cd dist && shasum -a 256 "$tarball" > "$tarball.sha256")
          fi
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boxme-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Releasing $tag"
          ls -l dist
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes
          fi
